# =============================================================================
# Komodo Resource Sync — Paperclip AI (Build + Stack + Procedure)
# Docs: https://komo.do/docs/sync-resources
#       https://komo.do/docs/build/builders  &  https://komo.do/docs/stacks
#
# Point a Komodo "Resource Sync" at this repo with resource path
# `komodo/resources.toml` (or the `komodo` folder) and Execute it.
#
# Image flow:
#   [[build]] paperclip-server  ──build & push──▶  <registry>/<owner>/paperclip-server:latest
#   [[stack]] paperclip         ──pull & run──▶    compose.yaml (image: ${PAPERCLIP_IMAGE})
#   [[procedure]] paperclip-release  chains: build → deploy stack
#
# Replace the PLACEHOLDERS:
#   <builder>      : a Komodo Builder resource (Server builder or AWS builder)
#   <server>       : the Komodo Server (Periphery) the Stack runs on
#   <git-account>  : Komodo git account alias with access to this repo
#   <owner/repo>   : this repository's path on your git provider
#   <registry-acct>: Komodo registry account alias used to push/pull the image
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# BUILD — compiles the image from the Dockerfile and pushes it to a registry.
# ─────────────────────────────────────────────────────────────────────────────
[[build]]
name = "paperclip-server"
description = "Build Paperclip AI server image from source and push to registry"
tags = ["ai", "paperclip"]

[build.config]
builder = "<builder>"

# Source of the build context (this repo):
git_provider = "github.com"
git_account = "<git-account>"
repo = "<owner/repo>"
branch = "main"
build_path = "."
dockerfile_path = "Dockerfile"

# Where to push the built image. `domain` + `account` form the image prefix,
# e.g. ghcr.io/<registry-acct>/paperclip-server
image_registry.domain = "ghcr.io"
image_registry.account = "<registry-acct>"
# image_registry.organization = ""   # set if pushing under an org namespace

# Bump this to cut a new image version/tag:
version = "0.1.0"

# Passed to the Dockerfile ARGs:
build_args = """
USER_UID=1000
USER_GID=1000
"""

# ─────────────────────────────────────────────────────────────────────────────
# STACK — pulls the pre-built image and runs compose. No build at deploy time.
# ─────────────────────────────────────────────────────────────────────────────
[[stack]]
name = "paperclip"
description = "Paperclip AI — self-hosted (Postgres + pre-built server image)"
tags = ["ai", "paperclip"]

[stack.config]
server = "<server>"

# Compose file lives in this repo:
git_provider = "github.com"
git_account = "<git-account>"
repo = "<owner/repo>"
branch = "main"
file_paths = ["compose.yaml"]
project_name = "paperclip"

# Do NOT build on deploy — just pull the image referenced in compose.yaml:
run_build = false
auto_pull = true

# Registry credentials Komodo uses to pull the (possibly private) image:
registry_provider = "ghcr.io"
registry_account = "<registry-acct>"

# Redeploy triggers:
webhook_enabled = true
poll_for_updates = true
poll_interval = "5-min"
auto_update = false

# Injected into compose at deploy. PAPERCLIP_IMAGE must match the build's
# pushed tag. Leave secrets blank here and set them in the UI to keep them
# out of git. Generate: BETTER_AUTH_SECRET=openssl rand -hex 32,
# POSTGRES_PASSWORD=openssl rand -hex 16
environment = """
PAPERCLIP_IMAGE=ghcr.io/<registry-acct>/paperclip-server:latest
PAPERCLIP_PUBLIC_URL=https://paperclip.example.com
BETTER_AUTH_SECRET=
POSTGRES_PASSWORD=
ANTHROPIC_API_KEY=
OPENAI_API_KEY=
USER_UID=1000
USER_GID=1000
"""
environment_is_secret = true

# ─────────────────────────────────────────────────────────────────────────────
# PROCEDURE — one-click "release": build the image, then redeploy the stack.
# Run this instead of deploying the stack directly when you want a fresh build.
# ─────────────────────────────────────────────────────────────────────────────
[[procedure]]
name = "paperclip-release"
description = "Build the server image, then deploy the Paperclip stack"
tags = ["ai", "paperclip"]

[[procedure.config.stage]]
name = "Build image"
enabled = true
executions = [
  { execution.type = "RunBuild", execution.params.build = "paperclip-server", enabled = true },
]

[[procedure.config.stage]]
name = "Deploy stack"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "paperclip", enabled = true },
]
